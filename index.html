<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>東角園 お楽しみゲーム</title>
<style>
  :root{
    --bg:#f4efe4; --paper:#fbf7ee; --ink:#3a2c1a; --ink-soft:#7a6a53;
    --gold:#a8862f; --gold-soft:#c9aa57; --crimson:#9c3b2e; --green:#4a6b3a;
    --line:rgba(58,44,26,0.14);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; min-height:100%;}
  body{
    background:radial-gradient(circle at 50% 0%, rgba(168,134,47,0.08), transparent 60%), var(--bg);
    color:var(--ink);
    font-family:"Hiragino Mincho ProN","Yu Mincho","YuMincho",serif;
    display:flex; flex-direction:column; align-items:center;
    min-height:100vh; padding:14px 14px 18px; overflow-x:hidden;
  }
  .wrap{width:100%; max-width:760px; margin:0 auto;}
  header{text-align:center; margin-bottom:10px;}
  .brand-sub{font-size:14px; letter-spacing:0.35em; color:var(--ink-soft); margin-bottom:4px; font-weight:600;}
  .brand{font-size:34px; letter-spacing:0.25em; font-weight:700; line-height:1.1;}
  .brand .seal{display:inline-block; vertical-align:middle; margin-left:10px; width:34px; height:34px;
    border-radius:6px; background:var(--crimson); color:#fbf7ee; font-size:15px; line-height:34px; font-weight:600;}

  /* ---- タイトル画面 ---- */
  #title-screen{text-align:center;}
  .title-game{font-size:22px; letter-spacing:0.2em; color:var(--ink); margin:4px 0 2px; font-weight:700;}
  .title-lead{font-size:15px; color:var(--ink-soft); line-height:1.7; margin:10px auto 14px; max-width:560px; font-weight:600;}
  .title-notice{position:relative; max-width:460px; margin:14px auto 12px; padding:16px 18px 15px;
    background:linear-gradient(180deg,#fff8e8,#fbf2db); border:1.5px solid var(--gold-soft); border-radius:16px;
    color:var(--crimson); font-size:19px; font-weight:700; line-height:1.6; letter-spacing:0.04em;
    box-shadow:0 3px 0 rgba(168,134,47,0.18);}
  .title-notice .notice-mark{display:inline-block; margin-bottom:8px; padding:3px 14px; border-radius:20px;
    background:var(--crimson); color:#fbf7ee; font-size:13px; font-weight:700; letter-spacing:0.12em;}
  .tier-buttons{display:flex; flex-direction:column; gap:10px; max-width:420px; margin:0 auto;}
  .tier-btn{
    font-family:inherit; cursor:pointer; text-align:center;
    background:var(--paper); border:1px solid var(--gold-soft); border-radius:16px;
    padding:13px 20px; transition:background .15s, transform .1s;
    box-shadow:0 2px 0 rgba(168,134,47,0.18);
  }
  .tier-btn:active{background:#efe7d6; transform:translateY(1px);}
  .tier-btn .t-amt{font-size:21px; font-weight:700; color:var(--crimson); letter-spacing:0.03em;}
  .tier-btn .t-desc{font-size:14px; color:var(--ink-soft); margin-top:4px; font-weight:600;}
  .tier-btn .t-desc b{color:var(--gold);}

  /* ---- ゲーム画面 ---- */
  #game-screen{display:none;}
  .tier-banner{margin:0 auto 4px; max-width:620px; background:var(--paper); border:1px solid var(--line);
    border-radius:14px; padding:14px 18px; text-align:center; box-shadow:0 2px 0 rgba(168,134,47,0.18);}
  .tier-amount{font-size:19px; color:var(--crimson); font-weight:700; letter-spacing:0.04em;}
  .tier-rule{font-size:15px; color:var(--ink-soft); margin-top:5px; line-height:1.6; font-weight:600;}
  .tier-rule b{color:var(--gold);}
  .stats{display:flex; justify-content:center; gap:14px; margin:12px 0 12px;}
  .stat{background:var(--paper); border:1px solid var(--line); border-radius:12px; padding:8px 20px; text-align:center; min-width:120px;}
  .stat-label{font-size:13px; color:var(--ink-soft); letter-spacing:0.08em; font-weight:600;}
  .stat-value{font-size:28px; font-weight:700; margin-top:2px;}
  /* 結果は全画面オーバーレイ（盤面の高さに関係なく1画面に収める） */
  #result{display:none; position:fixed; inset:0; z-index:60; padding:16px;
    align-items:center; justify-content:center;
    background:rgba(58,44,26,0.45); -webkit-backdrop-filter:blur(2px); backdrop-filter:blur(2px);}
  #result.show{display:flex;}
  .result-inner{width:100%; max-width:440px; max-height:94vh; overflow-y:auto;
    border-radius:18px; padding:20px 18px; text-align:center; box-shadow:0 14px 44px rgba(0,0,0,0.28);}
  #result.win .result-inner{background:#eef4e6; border:1px solid #b9cda3; color:var(--green);}
  #result.lose .result-inner{background:#fbf7ee; border:1px solid var(--line); color:var(--ink-soft);}
  #result .r-title{font-size:24px; font-weight:700; margin-bottom:6px;}
  #result .r-body{font-size:15px; line-height:1.6; font-weight:600;}
  #result .won-list{margin-top:9px; display:flex; flex-wrap:wrap; gap:7px; justify-content:center;}
  #result .won-chip{background:#fdf6e3; border:1px solid var(--gold-soft); color:var(--ink); border-radius:20px; padding:4px 13px; font-size:14px; font-weight:700;}
  #result .thanks{margin-top:12px; padding-top:11px; border-top:1px dashed var(--line);
    font-size:15px; line-height:1.7; color:var(--ink); letter-spacing:0.03em; font-weight:600;}
  .result-actions{margin-top:16px; display:flex; gap:10px; justify-content:center; flex-wrap:wrap;}
  #board{display:grid; grid-template-columns:repeat(4,1fr); gap:10px; max-width:520px; margin:0 auto;}
  .card{position:relative; aspect-ratio:3/4; border:none; padding:0; cursor:pointer; background:transparent; perspective:800px; border-radius:14px;}
  .card-inner{position:absolute; inset:0; border-radius:14px; transition:transform .45s cubic-bezier(.4,.2,.2,1); transform-style:preserve-3d;}
  .card.flipped .card-inner{transform:rotateY(180deg);}
  .face{position:absolute; inset:0; border-radius:14px; display:flex; flex-direction:column; align-items:center; justify-content:center;
    backface-visibility:hidden; -webkit-backface-visibility:hidden; overflow:hidden;}
  .face-back{background:repeating-linear-gradient(45deg, rgba(168,134,47,0.08) 0 8px, transparent 8px 16px), var(--paper); border:1px solid var(--gold-soft);}
  .face-back .mon{width:46px; height:46px; border-radius:50%; border:2px solid var(--gold); color:var(--gold);
    display:flex; align-items:center; justify-content:center; font-size:24px; font-weight:600;}
  .face-front{transform:rotateY(180deg); border:1px solid rgba(58,44,26,0.18); padding:0; background:#fff;
    flex-direction:column; justify-content:flex-end;}
  .face-front .kashi-photo{position:absolute; top:0; left:0; right:0; bottom:46px; background-size:cover; background-position:center;}
  .face-front .kashi-label{position:absolute; left:0; right:0; bottom:0; height:46px; background:var(--paper);
    border-top:1px solid var(--line); display:flex; flex-direction:column; align-items:center; justify-content:center;}
  .face-front .kashi-sub{font-size:10px; opacity:0.8; letter-spacing:0.05em; line-height:1.2; font-weight:600;}
  .face-front .kashi-name{font-size:15px; font-weight:700; letter-spacing:0.02em; line-height:1.25;}
  .card.done{cursor:default;}
  .card.done .face-front{border:2px solid var(--gold); box-shadow:0 0 0 3px rgba(168,134,47,0.18) inset;}
  .card.done .face-front .kashi-photo::after{content:"あたり"; position:absolute; top:6px; right:6px;
    background:var(--crimson); color:#fbf7ee; font-size:11px; padding:2px 7px; border-radius:10px; letter-spacing:0.05em;}
  .controls{text-align:center; margin-top:14px; display:flex; gap:14px; justify-content:center; flex-wrap:wrap;}
  .btn{font-family:inherit; font-size:17px; font-weight:700; color:var(--ink); background:var(--paper); border:1px solid var(--gold-soft);
    border-radius:30px; padding:11px 30px; cursor:pointer; letter-spacing:0.06em; transition:background .15s;}
  .btn:active{background:#efe7d6;}
  .btn-secondary{border-color:var(--line); color:var(--ink-soft);}
  .foot{text-align:center; font-size:12px; color:var(--ink-soft); margin-top:12px; letter-spacing:0.05em; font-weight:600; line-height:1.8;}
  #title-screen .maker{margin-top:20px; font-size:13px; font-weight:700; color:var(--gold); letter-spacing:0.06em;}

  /* 縦型（ポートレート）スマホ・タブレット向け最適化：1画面に収める */
  @media (orientation: portrait){
    .wrap{max-width:560px;}
    .brand{font-size:36px;}
    .title-game{font-size:23px;}
    .title-lead{font-size:16px;}
    /* スマホでは4列＝3行に収め、縦の高さを抑える */
    #board{grid-template-columns:repeat(4,1fr); max-width:520px; gap:10px;}
    .tier-btn{padding:14px 20px;}
    .tier-btn .t-amt{font-size:22px;}
    .tier-btn .t-desc{font-size:15px;}
    .stat{min-width:130px; padding:9px 22px;}
    .stat-value{font-size:30px;}
    .stat-label{font-size:14px;}
    .tier-amount{font-size:20px;}
    .tier-rule{font-size:16px;}
    .face-front .kashi-name{font-size:15px;}
    .face-front .kashi-sub{font-size:11px;}
    .face-front .kashi-label{height:46px;}
    .face-front .kashi-photo{bottom:46px;}
    #result .r-title{font-size:25px;}
    #result .r-body{font-size:17px;}
    #result .thanks{font-size:18px;}
    .btn{font-size:18px; padding:12px 30px;}
  }

  /* 画面が低いとき（横向き等）はさらに圧縮 */
  @media (max-height:680px){
    body{padding:8px 12px 12px;}
    header{margin-bottom:6px;}
    .brand{font-size:26px;}
    .title-lead{margin:8px auto 10px; line-height:1.5;}
    .stats{margin:8px 0;}
    #board{max-width:440px; gap:8px;}
    .controls{margin-top:10px;}
    .foot{margin-top:8px;}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand-sub">銘菓・御菓子所</div>
    <div class="brand">東角園<span class="seal">菓</span></div>
  </header>

  <!-- タイトル / 金額選択画面 -->
  <div id="title-screen">
    <div class="title-game">お買い物お楽しみゲーム</div>
    <div class="title-notice">
      <span class="notice-mark">お知らせ</span>
      現在、お買い物金額に応じて<br>素敵な特典をご用意しております！
    </div>
    <div class="title-lead">
      神経衰弱で同じ銘菓をそろえると、その数だけ和菓子を一品プレゼント。<br>
      下のボタンから、お会計金額に応じてお選びください。
    </div>
    <div class="tier-buttons">
      <button class="tier-btn" data-tries="1">
        <div class="t-amt">3,000円以上 お買い上げ</div>
        <div class="t-desc">チャンス <b>1回</b></div>
      </button>
      <button class="tier-btn" data-tries="3">
        <div class="t-amt">5,000円以上 お買い上げ</div>
        <div class="t-desc">チャンス <b>3回</b></div>
      </button>
      <button class="tier-btn" data-tries="6">
        <div class="t-amt">10,000円以上 お買い上げ</div>
        <div class="t-desc">チャンス <b>6回</b></div>
      </button>
    </div>
    <div class="maker">制作：合同会社インカムベース</div>
  </div>

  <!-- ゲーム画面 -->
  <div id="game-screen">
    <div class="tier-banner">
      <div class="tier-amount" id="banner-amount"></div>
      <div class="tier-rule" id="banner-rule"></div>
    </div>
    <div class="stats">
      <div class="stat"><div class="stat-label">のこりチャンス</div><div class="stat-value" id="tries">0</div></div>
      <div class="stat"><div class="stat-label">あたり</div><div class="stat-value" id="pairs">0品</div></div>
    </div>
    <div id="board"></div>
    <div id="result"></div>
    <div class="controls">
      <button class="btn" id="retry">もう一度（同じ金額）</button>
      <button class="btn btn-secondary" id="back">最初に戻る</button>
    </div>
  </div>

  <div class="foot">愛知県西尾市吉良町上横須賀菱池3番地　東角園</div>
</div>

  ];

  var TIERS = {
    1:{amount:"3,000円以上お買い上げのお客様へ", rule:'2枚めくって同じ銘菓ならあたり・チャンスは<b>1回</b><br>そろえば和菓子を一品プレゼント'},
    3:{amount:"5,000円以上お買い上げのお客様へ", rule:'同じ銘菓を2枚そろえたら「あたり」・チャンスは<b>3回</b><br>そろえた数だけ和菓子を一品プレゼント'},
    6:{amount:"10,000円以上お買い上げのお客様へ", rule:'同じ銘菓を2枚そろえたら「あたり」・チャンスは<b>6回</b><br>そろえた数だけ和菓子を一品プレゼント'}
  };

  var titleScreen=document.getElementById('title-screen');
  var gameScreen=document.getElementById('game-screen');
  var board=document.getElementById('board');
  var triesEl=document.getElementById('tries');
  var pairsEl=document.getElementById('pairs');
  var resultEl=document.getElementById('result');
  var bannerAmount=document.getElementById('banner-amount');
  var bannerRule=document.getElementById('banner-rule');

  var deck, first, second, lock, tries, matched, over, wonNames, maxTries;

  function shuffle(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}

  function startTier(n){
    maxTries=n;
    bannerAmount.textContent=TIERS[n].amount;
    bannerRule.innerHTML=TIERS[n].rule;
    titleScreen.style.display='none';
    gameScreen.style.display='block';
    initGame();
  }

  function initGame(){
    deck=shuffle(items.concat(items).map(function(it,i){return {id:i,item:it};}));
    first=null; second=null; lock=false; tries=maxTries; matched=0; over=false; wonNames=[];
    triesEl.textContent=tries;
    pairsEl.textContent='0品';
    resultEl.className=''; resultEl.innerHTML='';
    render();
  }

  function render(){
    board.innerHTML='';
    deck.forEach(function(card){
      var el=document.createElement('button');
      el.className='card'; el.setAttribute('aria-label','カード');
      el.innerHTML='<div class="card-inner">'+
        '<div class="face face-back"><div class="mon">菓</div></div>'+
        '<div class="face face-front">'+
          '<div class="kashi-photo" style="background-image:url('+card.item.img+')"></div>'+
          '<div class="kashi-label"><span class="kashi-sub">'+card.item.sub+'</span><span class="kashi-name">'+card.item.name+'</span></div>'+
        '</div></div>';
      el.addEventListener('click', function(){ flip(el, card); });
      board.appendChild(el);
    });
  }

  function flip(el,card){
    if(lock||over) return;
    if(el.classList.contains('done')) return;
    if(first&&first.el===el) return;
    el.classList.add('flipped');
    if(!first){ first={el:el,card:card}; return; }
    second={el:el,card:card}; lock=true; tries--; triesEl.textContent=tries;
    if(first.card.item.name===second.card.item.name){
      first.el.classList.add('done'); second.el.classList.add('done');
      setTimeout(function(){
        matched++; wonNames.push(first.card.item.name); pairsEl.textContent=matched+'品';
        first=null; second=null; lock=false;
        if(tries<=0) finish();
      },500);
    } else {
      setTimeout(function(){
        first.el.classList.remove('flipped'); second.el.classList.remove('flipped');
        first=null; second=null; lock=false;
        if(tries<=0) finish();
      },900);
    }
  }

  function finish(){
    over=true;
    var inner;
    if(matched>0){
      var chips=wonNames.map(function(n){return '<span class="won-chip">'+n+'</span>';}).join('');
      resultEl.className='win show';
      inner='<div class="r-title">あたり '+matched+' 品！</div>'+
        '<div class="r-body">下記の銘菓を当てられました。<br>この画面を店員にお見せください。</div>'+
        '<div class="won-list">'+chips+'</div>'+
        '<div class="thanks">お買い物ありがとうございました。<br>これからも東角園をよろしくお願いいたします！</div>';
    } else {
      resultEl.className='lose show';
      inner='<div class="r-title">ざんねん…</div>'+
        '<div class="r-body">今回はそろいませんでした。<br>またのご来店をお待ちしております。</div>'+
        '<div class="thanks">お買い物ありがとうございました。<br>これからも東角園をよろしくお願いいたします！</div>';
    }
    resultEl.innerHTML='<div class="result-inner">'+inner+
      '<div class="result-actions">'+
        '<button class="btn" id="r-retry">もう一度（同じ金額）</button>'+
        '<button class="btn btn-secondary" id="r-back">最初に戻る</button>'+
      '</div></div>';
    document.getElementById('r-retry').addEventListener('click', initGame);
    document.getElementById('r-back').addEventListener('click', backToTitle);
  }

  Array.prototype.forEach.call(document.querySelectorAll('.tier-btn'), function(b){
    b.addEventListener('click', function(){ startTier(parseInt(b.getAttribute('data-tries'),10)); });
  });
  function backToTitle(){
    resultEl.className=''; resultEl.innerHTML='';
    gameScreen.style.display='none'; titleScreen.style.display='block';
  }
  document.getElementById('retry').addEventListener('click', initGame);
  document.getElementById('back').addEventListener('click', backToTitle);
})();
</script>
</body>
</html>
